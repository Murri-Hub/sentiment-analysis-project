global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files: []

scrape_configs:

  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # Sentiment Analysis API
  - job_name: "sentiment-api"
    metrics_path: "/metrics"
    scrape_interval: 10s
    static_configs:
      - targets: ["sentiment-api:8000"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "sentiment-api"
